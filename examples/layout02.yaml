# layout02.yaml — packing dossier for table02 (reference HITL seed).
#
# CLI:
#   node src/render.js -m examples/table02.md examples/layout02.yaml   # chrome
#   node src/render.js examples/table02.md examples/layout02.yaml      # + route-v1
#   node src/render.js --emit-layout examples/table02.md              # regen seed
#
# Loaded by src/layout/loader.js → from-document (place) → route-v1 unless -m.
# Banks here match current spine emit for table02; edit x/y / faces by hand.
# Table remains electrical SoT. No wires or authored w/h.
#
#   components.<Name>  key = table column name
#     x, y   top-left grid cell of module box border
#     sides  pin banks N/E/S/W; N,S L→R; E,W T→B

components:
  ESP32-C3:
    x: 1
    y: 0
    sides:
      N: []
      E: [3V3, GND, GPIO8, GPIO9, GPIO4, GPIO3]
      S: []
      W: []

  ADS1115:
    x: 24
    y: 0
    sides:
      N: []
      E: [AIN0, AIN1, AIN2, AIN3]
      S: []
      W: [VDD, GND, SDA, SCL, ADDR]

  RELAY:
    x: 12
    y: 14
    sides:
      N: [IN]
      E: [NO, COM, 5V]
      S: [GND]
      W: []

  ZMCT103C:
    x: 38
    y: 17
    sides:
      N: [OUT]
      E: [5V]
      S: [GND]
      W: []

# Deferred on the same dossier (do not invent meaning yet):
#   orientation: h | v     # passives
#   edge: N | E | S | W    # boundary preference (GLYPHS)
#   group: <id>            # layout-only rigid group
