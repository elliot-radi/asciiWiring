# layout02.yaml — layout sidecar for table02 (nested / face-banked)
#
# STATUS: loaded by CLI `--layout examples/layout02.yaml` (`from-document`).
# Validated by `src/layout/loader.js`; applied via spine-first geometry
# overlay in `src/layout/from-document.js` (course correction: no parallel router).
#
# This copy mirrors current spine-v1 box origins + face banks for table02 so
# `--layout` can round-trip near spine quality. Hand-edit x/y to tune;
# see docs/LAYOUT.md.
#
#   components.<Name> — glyph dossier (key = table column name)
#     x, y   — top-left grid cell of the module box border (integers)
#     sides  — pin banks by face; list order = edge order
#       keys:   always N, E, S, W
#       order:  N, S → left → right; E, W → top → bottom
#
#   Table remains electrical SoT. No wires or authored w/h here.

components:
  ESP32-C3:
    x: 1
    y: 0
    sides:
      N: []
      E: [3V3, GND, GPIO8, GPIO9, GPIO4, GPIO3]
      S: []
      W: []

  ADS1115:
    x: 24
    y: 0
    sides:
      N: []
      E: [AIN0, AIN1, AIN2, AIN3]
      S: []
      W: [VDD, GND, SDA, SCL, ADDR]

  RELAY:
    x: 12
    y: 14
    sides:
      N: [IN]
      E: [NO, COM, 5V]
      S: [GND]
      W: []

  ZMCT103C:
    x: 38
    y: 17
    sides:
      N: [OUT]
      E: [5V]
      S: [GND]
      W: []

# Deferred on the same dossier (do not invent meaning yet):
#   orientation: h | v     # passives
#   edge: N | E | S | W    # boundary preference (GLYPHS)
#   group: <id>            # layout-only rigid group
